version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - unused
    - errcheck
    - funlen
    - gocognit
    - gocyclo
    - govet
    - staticcheck
    - whitespace
    - misspell
  settings:
    govet:
      disable:
        - shadow
    gocyclo:
      min-complexity: 15
    misspell:
      locale: US
    funlen:
      lines: 80
      statements: 60
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - funlen
          - gocyclo
          - gocognit

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/shinagawa-web
