name: verify-distribution

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-install:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Install via go install
        run: go install github.com/shinagawa-web/gomarklint/v3@latest

      - name: Verify version matches latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          expected=$(gh release view --repo shinagawa-web/gomarklint --json tagName -q .tagName)
          installed=$(go version -m "$(go env GOPATH)/bin/gomarklint" | awk '$1 == "mod" { print $3 }')
          echo "Expected : $expected"
          echo "Installed: $installed"
          if [ "$installed" != "$expected" ]; then
            echo "ERROR: version mismatch"
            exit 1
          fi
          echo "OK: $installed"

  homebrew:
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Install via Homebrew
        run: brew install shinagawa-web/tap/gomarklint

      - name: Verify version matches latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          expected=$(gh release view --repo shinagawa-web/gomarklint --json tagName -q .tagName)
          expected_no_v="${expected#v}"
          installed=$(brew list --versions gomarklint | awk '{print $2}')
          echo "Expected : $expected_no_v"
          echo "Installed: $installed"
          if [ "$installed" != "$expected_no_v" ]; then
            echo "ERROR: version mismatch"
            exit 1
          fi
          echo "OK: $installed"

  npm:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Install via npm
        run: npm install -g @shinagawa-web/gomarklint

      - name: Verify version matches latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          expected=$(gh release view --repo shinagawa-web/gomarklint --json tagName -q .tagName)
          expected_no_v="${expected#v}"
          installed=$(gomarklint --version | awk '{print $3}')
          echo "Expected : $expected_no_v"
          echo "Installed: $installed"
          if [ "$installed" != "$expected_no_v" ]; then
            echo "ERROR: version mismatch"
            exit 1
          fi
          echo "OK: $installed"
