name: Test Action

on:
  pull_request:
    paths:
      - 'action.yml'
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'testdata/action/**'
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read

jobs:
  test-action:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run gomarklint Action
        uses: ./
        with:
          args: testdata/action
          comment-on-pr: 'true'
          github-token: ${{ secrets.GITHUB_TOKEN }}
