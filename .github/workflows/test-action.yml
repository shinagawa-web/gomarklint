name: Test Action

on:
  pull_request:
    paths:
      - 'action.yml'
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'testdata/action/**'
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read

jobs:
  test-action:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run gomarklint Action
        uses: ./
        with:
          args: testdata/action
          comment-on-pr: 'true'
          github-token: ${{ secrets.GITHUB_TOKEN }}
