name: Check go install

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  check-go-install:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          cache: false

      - name: Try go install (with retry for module proxy)
        run: |
          for i in 1 2 3 4 5; do
            if go install github.com/shinagawa-web/gomarklint/v3@latest; then
              break
            fi
            if [ "$i" -eq 5 ]; then
              echo "All attempts failed"
              exit 1
            fi
            echo "Attempt $i failed, retrying in 30s..."
            sleep 30
          done
          INSTALLED=$(go version -m "$(which gomarklint)" | awk '/^\s+mod/{print $3}')
          EXPECTED="${{ github.event.release.tag_name }}"
          if [ "$INSTALLED" != "$EXPECTED" ]; then
            echo "Version mismatch: installed=$INSTALLED expected=$EXPECTED"
            exit 1
          fi
          echo "OK: $INSTALLED"
